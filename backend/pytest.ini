[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:.coverage_html
    --cov-fail-under=85
markers =
    unit: fast tests with no external dependencies
    integration: tests exercising the API + DB end to end
    slow: tests that take noticeable time to run
filterwarnings =
    ignore::DeprecationWarning:passlib.*
asyncio_mode = auto
